name: Build and release exe

on:
  push:
    branches: [main]
    paths:
      - "extract/frida/server.py"
      - "extract/frida/app_icon.ico"
      - "extract/frida/combined_hook.js"
      - "extract/frida/VERSION"
      - "data/**"
      - ".github/workflows/release.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install frida flask pyinstaller

      - id: version
        shell: bash
        run: |
          major=$(cat extract/frida/VERSION | tr -d '[:space:]')
          v="$major.${{ github.run_number }}"
          echo "VERSION = \"$v\"" > extract/frida/_version.py
          echo "v=$v" >> "$GITHUB_OUTPUT"

      - run: python -m PyInstaller --onefile --clean --name SpiritValeMarket --icon "${{ github.workspace }}\extract\frida\app_icon.ico" --add-data "${{ github.workspace }}\extract\frida\combined_hook.js;." --distpath extract/frida --workpath build/pyinstaller --specpath build extract/frida/server.py

      - name: Package full install zip (exe + data)
        shell: bash
        run: |
          mkdir dist_zip
          cp extract/frida/SpiritValeMarket.exe dist_zip/
          cp -r data dist_zip/data
          cd dist_zip && 7z a -tzip ../SpiritValeMarket.zip . && cd ..

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.v }}
          name: v${{ steps.version.outputs.v }}
          files: |
            extract/frida/SpiritValeMarket.exe
            SpiritValeMarket.zip
